<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>小云 · AI 語音助理</title>
<style>
  :root{
    --ink:#2a2150; --soft:#6b5fb0; --card:rgba(255,255,255,.65);
    --accent:#7c5cff; --accent2:#46c8ff; --pink:#ff8fc7;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);overflow:hidden;position:relative;display:flex;flex-direction:column;height:100dvh;
    background:linear-gradient(170deg,#dbeafe 0%,#e7ddff 45%,#ffe3f3 100%);
  }

  /* ---- sky decorations ---- */
  .sky{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .sky .cloud{position:absolute;background:#fff;border-radius:50%;opacity:.7;filter:blur(1px);
    box-shadow:40px 10px 0 -6px #fff,80px 0 0 -10px #fff,-40px 8px 0 -8px #fff;animation:floatX 26s linear infinite;}
  .sky .c1{width:90px;height:90px;top:12%;left:-140px;}
  .sky .c2{width:60px;height:60px;top:30%;left:-120px;animation-duration:34s;animation-delay:-8s;opacity:.55;}
  .sky .c3{width:70px;height:70px;top:62%;left:-130px;animation-duration:30s;animation-delay:-16s;opacity:.5;}
  @keyframes floatX{to{transform:translateX(140vw);}}
  .sky .star{position:absolute;width:8px;height:8px;background:#fff;opacity:.8;
    clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);animation:twinkle 3s ease-in-out infinite;}
  .sky .s1{top:18%;right:14%;} .sky .s2{top:40%;right:26%;width:6px;height:6px;animation-delay:-1s;}
  .sky .s3{top:24%;left:18%;width:6px;height:6px;animation-delay:-2s;}
  @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:.9;transform:scale(1.1)}}

  /* ---- header ---- */
  header{position:relative;z-index:3;display:flex;align-items:center;gap:9px;padding:16px 20px;}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:#c3bdde;transition:.3s;}
  .brand-dot.live{background:#2ecc8f;animation:beat 1.6s infinite;}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(46,204,143,.5)}70%{box-shadow:0 0 0 11px rgba(46,204,143,0)}100%{box-shadow:0 0 0 0 rgba(46,204,143,0)}}
  header h1{font-size:17px;font-weight:800;letter-spacing:.4px;color:var(--ink);}
  header .tag{margin-left:auto;font-size:11px;color:var(--soft);font-weight:600;
    background:rgba(255,255,255,.6);padding:5px 11px;border-radius:999px;box-shadow:0 4px 14px rgba(124,92,255,.12);}

  /* ---- stage / character ---- */
  .stage{position:relative;z-index:1;flex:1;min-height:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:0 16px;}
  .charwrap{position:relative;width:min(78vw,300px);max-height:56vh;}
  .charwrap svg{width:100%;height:auto;display:block;overflow:visible;}

  #char{transform-box:fill-box;transform-origin:50% 50%;animation:bob 4.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

  .armL{transform-box:fill-box;transform-origin:88% 12%;animation:swayL 5s ease-in-out infinite;}
  .armR{transform-box:fill-box;transform-origin:12% 12%;animation:swayR 5s ease-in-out infinite;}
  @keyframes swayL{0%,100%{transform:rotate(4deg)}50%{transform:rotate(-8deg)}}
  @keyframes swayR{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(8deg)}}

  #aura{transform-box:fill-box;transform-origin:50% 50%;opacity:0;transition:opacity .4s;}
  .speaking #aura{opacity:1;animation:auraPulse 1.4s ease-in-out infinite;}
  @keyframes auraPulse{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.12);opacity:.8}}

  .blink #eyeL,.blink #eyeR{transform:scaleY(.08);}
  #eyeL,#eyeR{transform-box:fill-box;transform-origin:center;transition:transform .09s;}

  #mouth{transform-box:fill-box;transform-origin:center;transition:transform .1s;}

  /* listening sound rings */
  .rings{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:-1;}
  .rings i{position:absolute;left:50%;top:50%;width:140px;height:140px;margin:-70px 0 0 -70px;
    border-radius:50%;border:2px solid var(--accent);opacity:0;}
  .listening .rings i{animation:ring 2s ease-out infinite;}
  .rings i:nth-child(2){animation-delay:.7s;border-color:var(--accent2);}
  .rings i:nth-child(3){animation-delay:1.4s;border-color:var(--pink);}
  @keyframes ring{0%{transform:scale(.6);opacity:.6}100%{transform:scale(1.7);opacity:0}}

  .thinking #char{animation:bob 4.5s ease-in-out infinite, tilt 1.5s ease-in-out infinite;}
  @keyframes tilt{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .dots{position:absolute;left:50%;top:6%;transform:translateX(-50%);display:none;gap:6px;}
  .thinking .dots{display:flex;}
  .dots b{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(124,92,255,.4);
    animation:dotjump 1s infinite;}
  .dots b:nth-child(2){animation-delay:.15s;} .dots b:nth-child(3){animation-delay:.3s;}
  @keyframes dotjump{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-8px);opacity:1}}

  /* ---- subtitle (字幕) ---- */
  .subtitle{position:relative;z-index:2;min-height:74px;display:flex;align-items:center;justify-content:center;
    padding:0 18px;margin-bottom:6px;}
  .cap{max-width:680px;text-align:center;font-size:19px;font-weight:600;line-height:1.5;
    color:#fff;background:rgba(42,33,80,.78);padding:12px 20px;border-radius:18px;
    box-shadow:0 10px 30px rgba(42,33,80,.25);backdrop-filter:blur(6px);
    opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;
    display:inline-flex;align-items:center;gap:9px;}
  .cap.show{opacity:1;transform:none;}
  .cap .who{flex-shrink:0;font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;}
  .cap.assistant .who{background:linear-gradient(135deg,var(--accent),var(--accent2));}
  .cap.user .who{background:linear-gradient(135deg,#ff7eb3,#ff9966);}
  .cap.hint{background:rgba(255,255,255,.7);color:var(--soft);font-weight:600;font-size:15px;box-shadow:0 8px 22px rgba(124,92,255,.15);}

  /* ---- control ---- */
  .control{position:relative;z-index:3;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
    gap:9px;padding:10px 0 calc(22px + env(safe-area-inset-bottom));}
  #mic{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;position:relative;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px rgba(124,92,255,.45);transition:transform .12s,box-shadow .3s;}
  #mic:active{transform:scale(.93);}
  #mic.recording{background:linear-gradient(135deg,#ff5b8e,#ff3b5c);animation:micpulse 1.5s infinite;}
  #mic.speaking{background:linear-gradient(135deg,#2ecc8f,#10b981);}
  @keyframes micpulse{0%{box-shadow:0 10px 30px rgba(255,80,130,.5),0 0 0 0 rgba(255,80,130,.5)}
    70%{box-shadow:0 10px 30px rgba(255,80,130,.3),0 0 0 18px rgba(255,80,130,0)}
    100%{box-shadow:0 10px 30px rgba(255,80,130,.3),0 0 0 0 rgba(255,80,130,0)}}
  #mic:disabled{opacity:.6;cursor:wait;}
  #mic svg{fill:#fff;}
  .hint{font-size:13px;color:var(--soft);font-weight:600;}
</style>
</head>
<body>
  <div class="sky">
    <span class="cloud c1"></span><span class="cloud c2"></span><span class="cloud c3"></span>
    <i class="star s1"></i><i class="star s2"></i><i class="star s3"></i>
  </div>

  <header>
    <div class="brand-dot" id="dot"></div>
    <h1>小云</h1>
    <span class="tag">qwen3.5-omni · 即時語音</span>
  </header>

  <div class="stage" id="stage">
    <div class="rings"><i></i><i></i><i></i></div>
    <div class="dots"><b></b><b></b><b></b></div>
    <div class="charwrap">
      <svg viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg" aria-label="小云">
        <defs>
          <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#dff0ff"/>
          </linearGradient>
          <linearGradient id="gHair" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#9b8cff"/><stop offset="1" stop-color="#7c5cff"/>
          </linearGradient>
          <linearGradient id="gDress" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#8fd6ff"/><stop offset="1" stop-color="#6aa8ff"/>
          </linearGradient>
          <radialGradient id="gAura" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#a98bff" stop-opacity=".0"/>
            <stop offset="65" stop-color="#a98bff" stop-opacity=".35"/>
            <stop offset="100%" stop-color="#46c8ff" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="gCheek" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ff9ec4"/><stop offset="100%" stop-color="#ff9ec4" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- soft shadow -->
        <ellipse cx="150" cy="356" rx="74" ry="15" fill="#7c5cff" opacity=".16"/>
        <!-- glow aura behind -->
        <circle id="aura" cx="150" cy="150" r="140" fill="url(#gAura)"/>

        <g id="char">
          <!-- back hair -->
          <path d="M84 120 C70 60 120 24 150 24 C180 24 230 60 216 120 C232 150 224 196 206 214 L94 214 C76 196 68 150 84 120 Z" fill="url(#gHair)"/>

          <!-- arms (behind body) -->
          <g class="armR"><path d="M92 214 C66 224 56 256 64 282 C70 296 86 296 92 282 C96 262 100 238 110 224 Z" fill="url(#gBody)" stroke="#dfe9ff" stroke-width="2"/></g>
          <g class="armL"><path d="M208 214 C234 224 244 256 236 282 C230 296 214 296 208 282 C204 262 200 238 190 224 Z" fill="url(#gBody)" stroke="#dfe9ff" stroke-width="2"/></g>

          <!-- body / dress -->
          <path d="M104 206 C104 196 196 196 196 206 L214 300 C214 330 86 330 86 300 Z" fill="url(#gDress)"/>
          <path d="M104 206 C104 196 196 196 196 206 L200 232 C170 244 130 244 100 232 Z" fill="#ffffff" opacity=".25"/>
          <!-- collar -->
          <path d="M120 200 L150 222 L180 200 L168 192 L150 204 L132 192 Z" fill="#fff"/>

          <!-- neck -->
          <rect x="138" y="186" width="24" height="22" rx="10" fill="#f1f7ff"/>

          <!-- head -->
          <circle cx="150" cy="138" r="64" fill="url(#gBody)" stroke="#e6f0ff" stroke-width="2"/>
          <!-- front hair / bangs -->
          <path d="M88 134 C84 78 120 50 150 50 C180 50 216 78 212 134 C200 112 184 104 168 110 C160 92 140 92 132 110 C116 104 100 112 88 134 Z" fill="url(#gHair)"/>
          <!-- side hair tufts -->
          <path d="M86 132 C78 150 80 172 90 186 C92 166 90 148 96 134 Z" fill="url(#gHair)"/>
          <path d="M214 132 C222 150 220 172 210 186 C208 166 210 148 204 134 Z" fill="url(#gHair)"/>

          <!-- headphone (assistant vibe) -->
          <path d="M96 120 A56 56 0 0 1 204 120" fill="none" stroke="#7c5cff" stroke-width="8" stroke-linecap="round"/>
          <rect x="78" y="118" width="22" height="34" rx="11" fill="#7c5cff"/>
          <rect x="200" y="118" width="22" height="34" rx="11" fill="#7c5cff"/>
          <circle cx="89" cy="135" r="5" fill="#bfe3ff"/><circle cx="211" cy="135" r="5" fill="#bfe3ff"/>

          <!-- cheeks -->
          <ellipse cx="116" cy="156" rx="13" ry="9" fill="url(#gCheek)"/>
          <ellipse cx="184" cy="156" rx="13" ry="9" fill="url(#gCheek)"/>

          <!-- eyes -->
          <g>
            <ellipse id="eyeL" cx="126" cy="142" rx="11" ry="15" fill="#3a2f6b"/>
            <ellipse id="eyeR" cx="174" cy="142" rx="11" ry="15" fill="#3a2f6b"/>
            <circle cx="123" cy="137" r="4" fill="#fff"/><circle cx="171" cy="137" r="4" fill="#fff"/>
          </g>

          <!-- mouth -->
          <path id="mouth" d="M138 166 Q150 178 162 166" fill="none" stroke="#3a2f6b" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="subtitle">
    <div class="cap hint show" id="cap"><span>嗨，我是小云 👋 點擊麥克風，直接對我說話吧</span></div>
  </div>

  <div class="control">
    <button id="mic" aria-label="麥克風">
      <svg width="32" height="32" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    </button>
    <div class="hint" id="hint">點擊連接</div>
  </div>

<script>
  const VOICE='Ethan';
  const INSTRUCTIONS='你是个人助理小云，请用幽默风趣的方式回答用户的问题';

  const micBtn=document.getElementById('mic');
  const dotEl=document.getElementById('dot');
  const stageEl=document.getElementById('stage');
  const hintEl=document.getElementById('hint');
  const capEl=document.getElementById('cap');
  const charEl=document.getElementById('char');
  const eyeL=document.getElementById('eyeL');
  const eyeR=document.getElementById('eyeR');
  const mouthEl=document.getElementById('mouth');

  let ws=null,inputCtx=null,outputCtx=null,processor=null,micStream=null;
  let analyser=null,outGain=null,playHead=0,connected=false;
  let asmText='';

  function setAvatar(state){
    stageEl.classList.remove('listening','thinking','speaking');
    if(state) stageEl.classList.add(state);
  }

  // subtitle caption
  function setCaption(role,text,isHint){
    capEl.className='cap '+(isHint?'hint ':'')+(role||'');
    capEl.innerHTML = isHint
      ? '<span>'+text+'</span>'
      : '<span class="who">'+(role==='user'?'你':'小云')+'</span><span>'+text+'</span>';
    requestAnimationFrame(()=>capEl.classList.add('show'));
  }

  // random blink
  setInterval(()=>{if(!document.hidden){charEl.classList.add('blink');setTimeout(()=>charEl.classList.remove('blink'),130);}},
    2800+Math.random()*2200);

  function f32toI16(f){const o=new Int16Array(f.length);for(let i=0;i<f.length;i++){const s=Math.max(-1,Math.min(1,f[i]));o[i]=s<0?s*0x8000:s*0x7FFF;}return o;}
  function b64(buf){const u=new Uint8Array(buf);let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));return btoa(s);}

  function playPCM16(s){
    if(!outputCtx)return;
    const bin=atob(s),i16=new Int16Array(bin.length/2);
    for(let i=0;i<i16.length;i++)i16[i]=bin.charCodeAt(i*2)|(bin.charCodeAt(i*2+1)<<8);
    const f=new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++)f[i]=i16[i]/(i16[i]<0?0x8000:0x7FFF);
    const buf=outputCtx.createBuffer(1,f.length,24000);buf.copyToChannel(f,0);
    const src=outputCtx.createBufferSource();src.buffer=buf;src.connect(outGain);
    const t=Math.max(outputCtx.currentTime,playHead);src.start(t);playHead=t+buf.duration;
  }

  let raf=null;
  function reactLoop(){
    if(!analyser){raf=null;return;}
    const arr=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(arr);
    let sum=0;for(let i=0;i<arr.length;i++){const v=(arr[i]-128)/128;sum+=v*v;}
    const rms=Math.sqrt(sum/arr.length);
    // open mouth by scaling Y based on volume
    const open=1+Math.min(rms*7,2.6);
    mouthEl.style.transform=`scaleY(${open.toFixed(2)})`;
    raf=requestAnimationFrame(reactLoop);
  }
  function stopReact(){if(raf)cancelAnimationFrame(raf);raf=null;mouthEl.style.transform='';}

  function newOutputCtx(){
    outputCtx=new AudioContext();playHead=0;
    outGain=outputCtx.createGain();
    analyser=outputCtx.createAnalyser();analyser.fftSize=256;
    outGain.connect(analyser);analyser.connect(outputCtx.destination);
  }

  async function connect(){
    setCaption(null,'請求麥克風…',true);micBtn.disabled=true;hintEl.textContent='';
    try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});}
    catch(e){setCaption(null,'無法取得麥克風：'+e.message,true);micBtn.disabled=false;hintEl.textContent='點擊重試';return;}

    setCaption(null,'連接中…',true);
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/realtime');

    ws.onopen=()=>{
      connected=true;newOutputCtx();
      ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'session.update',session:{
        modalities:['audio','text'],voice:VOICE,instructions:INSTRUCTIONS,
        input_audio_format:'pcm16',output_audio_format:'pcm16',
        input_audio_transcription:{model:null},
        turn_detection:{type:'server_vad',threshold:0.2,prefix_padding_ms:300,silence_duration_ms:800}
      }}));

      try{inputCtx=new AudioContext({sampleRate:16000});}catch{inputCtx=new AudioContext();}
      const src=inputCtx.createMediaStreamSource(micStream);
      processor=inputCtx.createScriptProcessor(4096,1,1);
      src.connect(processor);processor.connect(inputCtx.destination);
      const inRate=inputCtx.sampleRate,tgt=16000;
      processor.onaudioprocess=e=>{
        if(!ws||ws.readyState!==WebSocket.OPEN)return;
        let s=e.inputBuffer.getChannelData(0);
        if(inRate!==tgt){const r=inRate/tgt,l=Math.floor(s.length/r),d=new Float32Array(l);
          for(let i=0;i<l;i++)d[i]=s[Math.floor(i*r)];s=d;}
        ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'input_audio_buffer.append',audio:b64(f32toI16(s).buffer)}));
      };

      micBtn.disabled=false;micBtn.className='recording';
      dotEl.className='brand-dot live';
      hintEl.textContent='再按一次斷開';
      setAvatar('listening');setCaption(null,'🎙️ 我在聽，請說話…',true);
    };

    ws.onmessage=e=>{
      let m;try{m=JSON.parse(e.data);}catch{return;}
      switch(m.type){
        case 'session.created':case 'session.updated':break;
        case 'input_audio_buffer.speech_started':
          stopReact();if(outputCtx){try{outputCtx.close();}catch{}}newOutputCtx();
          micBtn.className='recording';setAvatar('listening');setCaption(null,'🎙️ 我在聽…',true);break;
        case 'input_audio_buffer.speech_stopped':
          setAvatar('thinking');setCaption(null,'🤔 思考中…',true);break;
        case 'response.audio.delta':
          micBtn.className='speaking';setAvatar('speaking');
          if(!raf)reactLoop();playPCM16(m.delta);break;
        case 'response.audio_transcript.delta':
          asmText+=m.delta;setCaption('assistant',asmText);break;
        case 'response.audio_transcript.done':
          if(m.transcript)setCaption('assistant',m.transcript);asmText='';break;
        case 'response.done':case 'response.audio.done':
          stopReact();micBtn.className='recording';setAvatar('listening');
          setTimeout(()=>{if(connected&&!asmText)setCaption(null,'🎙️ 我在聽，請說話…',true);},2200);break;
        case 'conversation.item.input_audio_transcription.completed':
          if(m.transcript?.trim())setCaption('user',m.transcript.trim());break;
        case 'error':
          console.error('Realtime error:',m);
          setCaption(null,'⚠️ '+(m.error?.message||JSON.stringify(m.error||m)),true);break;
      }
    };

    ws.onclose=()=>{cleanup();setCaption(null,'已斷開，點擊重連',true);hintEl.textContent='點擊連接';};
    ws.onerror=()=>{cleanup();setCaption(null,'連接錯誤，點擊重試',true);hintEl.textContent='點擊重試';};
  }

  function disconnect(){ws?.close();cleanup();setCaption(null,'已斷開，點擊重連',true);hintEl.textContent='點擊連接';}

  function cleanup(){
    connected=false;stopReact();asmText='';
    processor?.disconnect();processor=null;
    inputCtx?.close();inputCtx=null;
    outputCtx?.close();outputCtx=null;analyser=null;outGain=null;
    micStream?.getTracks().forEach(t=>t.stop());micStream=null;ws=null;
    micBtn.disabled=false;micBtn.className='';
    dotEl.className='brand-dot';setAvatar(null);
  }

  micBtn.addEventListener('click',()=>{connected?disconnect():connect();});
</script>
</body>
</html>
