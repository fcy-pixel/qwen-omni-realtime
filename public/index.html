<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>小云 · AI 語音助理</title>
<style>
  :root{
    --bg1:#0a0e1a; --bg2:#131a2e; --accent:#6ea8ff; --accent2:#a98bff;
    --glass:rgba(255,255,255,.06); --glass-border:rgba(255,255,255,.12);
    --text:#eef2ff; --muted:#8b97b8;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--text);overflow:hidden;position:relative;
    background:radial-gradient(1200px 800px at 20% -10%,#1b2748 0%,transparent 55%),
               radial-gradient(1000px 700px at 100% 10%,#2a1d4a 0%,transparent 50%),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    display:flex;flex-direction:column;height:100dvh;
  }
  .ambient{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  .ambient span{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:drift 18s ease-in-out infinite;}
  .ambient span:nth-child(1){width:340px;height:340px;background:#3a5bd0;top:-80px;left:-60px;}
  .ambient span:nth-child(2){width:300px;height:300px;background:#7c4dd1;bottom:-90px;right:-50px;animation-delay:-6s;}
  .ambient span:nth-child(3){width:240px;height:240px;background:#2bb6c9;top:40%;right:20%;animation-delay:-11s;}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-25px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.95)}}

  header{position:relative;z-index:2;display:flex;align-items:center;gap:10px;padding:16px 20px;}
  .brand-dot{width:10px;height:10px;border-radius:50%;background:#566;transition:.3s;}
  .brand-dot.live{background:#46e0a0;animation:beat 1.6s infinite;}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(70,224,160,.5)}70%{box-shadow:0 0 0 12px rgba(70,224,160,0)}100%{box-shadow:0 0 0 0 rgba(70,224,160,0)}}
  header h1{font-size:16px;font-weight:600;letter-spacing:.3px;}
  header .tag{margin-left:auto;font-size:11px;color:var(--muted);border:1px solid var(--glass-border);
    background:var(--glass);padding:4px 10px;border-radius:999px;backdrop-filter:blur(8px);}

  .stage{position:relative;z-index:1;flex:0 0 auto;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:14px 0 6px;}
  .avatar-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
  .ring{position:absolute;border-radius:50%;border:2px solid var(--accent);opacity:0;}
  .listening .ring{animation:ripple 1.8s ease-out infinite;}
  .ring:nth-child(2){animation-delay:.6s;}
  .ring:nth-child(3){animation-delay:1.2s;}
  @keyframes ripple{0%{width:120px;height:120px;opacity:.55}100%{width:230px;height:230px;opacity:0}}

  .orb{position:relative;width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#bcd3ff 0%,#6ea8ff 38%,#7d5cf0 78%,#5a3fd0 100%);
    box-shadow:0 12px 40px rgba(98,120,255,.45),inset 0 -14px 30px rgba(40,20,90,.5),inset 0 12px 24px rgba(255,255,255,.35);
    transition:transform .12s ease;animation:floaty 4s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .orb::after{content:"";position:absolute;top:14px;left:22px;width:42px;height:30px;border-radius:50%;
    background:rgba(255,255,255,.55);filter:blur(4px);transform:rotate(-18deg);}
  .face{position:absolute;inset:0;z-index:3;}
  .eye{position:absolute;top:58px;width:18px;height:22px;background:#1c2440;border-radius:50%;overflow:hidden;}
  .eye::after{content:"";position:absolute;top:3px;left:3px;width:7px;height:7px;border-radius:50%;background:#cfe0ff;}
  .eye.l{left:42px;} .eye.r{right:42px;}
  .face.blink .eye{animation:blink .2s;}
  @keyframes blink{0%,100%{height:22px}50%{height:3px}}
  .mouth{position:absolute;left:50%;top:92px;transform:translateX(-50%);
    width:30px;height:8px;background:#1c2440;border-radius:0 0 18px 18px;transition:.12s;}

  .speaking .orb{animation:floaty 4s ease-in-out infinite, glow 1.2s ease-in-out infinite;}
  @keyframes glow{0%,100%{box-shadow:0 12px 40px rgba(98,120,255,.45),inset 0 -14px 30px rgba(40,20,90,.5),inset 0 12px 24px rgba(255,255,255,.35)}
    50%{box-shadow:0 16px 60px rgba(120,150,255,.8),inset 0 -14px 30px rgba(40,20,90,.5),inset 0 12px 24px rgba(255,255,255,.45)}}
  .thinking .orb{animation:floaty 4s ease-in-out infinite, wobble 1.4s ease-in-out infinite;}
  @keyframes wobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .thinking .mouth{width:14px;height:14px;border-radius:50%;background:#1c2440;top:90px;animation:think 1s infinite;}
  @keyframes think{0%,100%{opacity:.4}50%{opacity:1}}

  .status{margin-top:18px;font-size:14px;color:var(--muted);min-height:20px;text-align:center;transition:.3s;letter-spacing:.2px;}
  .status.active{color:var(--text);}

  .panel{position:relative;z-index:1;flex:1;min-height:0;margin:6px 14px 0;
    background:var(--glass);border:1px solid var(--glass-border);border-radius:20px 20px 0 0;
    backdrop-filter:blur(18px);overflow:hidden;display:flex;flex-direction:column;}
  .panel-head{padding:10px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--glass-border);
    display:flex;align-items:center;gap:6px;flex-shrink:0;}
  #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  #messages::-webkit-scrollbar{width:5px;}
  #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px;}
  .empty{margin:auto;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;}
  .msg{display:flex;gap:9px;max-width:88%;animation:rise .25s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .user .av{background:linear-gradient(135deg,#4a8cff,#6ea8ff);}
  .assistant .av{background:linear-gradient(135deg,#7d5cf0,#a98bff);}
  .bub{padding:9px 13px;border-radius:14px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .user .bub{background:linear-gradient(135deg,#2f6bff,#4a8cff);border-radius:14px 4px 14px 14px;}
  .assistant .bub{background:rgba(255,255,255,.08);border:1px solid var(--glass-border);border-radius:4px 14px 14px 14px;}

  .control{position:relative;z-index:2;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
    gap:8px;padding:16px 0 calc(18px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(8,11,22,.6));}
  #mic{width:70px;height:70px;border-radius:50%;border:none;cursor:pointer;position:relative;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 30px rgba(110,120,255,.5);transition:transform .12s,box-shadow .3s;}
  #mic:active{transform:scale(.93);}
  #mic.recording{background:linear-gradient(135deg,#ff5b6e,#ff3b5c);animation:micpulse 1.5s infinite;}
  #mic.speaking{background:linear-gradient(135deg,#34d399,#10b981);}
  @keyframes micpulse{0%{box-shadow:0 8px 30px rgba(255,80,100,.5),0 0 0 0 rgba(255,80,100,.5)}
    70%{box-shadow:0 8px 30px rgba(255,80,100,.3),0 0 0 18px rgba(255,80,100,0)}
    100%{box-shadow:0 8px 30px rgba(255,80,100,.3),0 0 0 0 rgba(255,80,100,0)}}
  #mic:disabled{opacity:.6;cursor:wait;}
  #mic svg{fill:#fff;}
  .hint{font-size:12px;color:var(--muted);}
</style>
</head>
<body>
  <div class="ambient"><span></span><span></span><span></span></div>

  <header>
    <div class="brand-dot" id="dot"></div>
    <h1>小云</h1>
    <span class="tag">qwen3.5-omni · 即時語音</span>
  </header>

  <div class="stage" id="stage">
    <div class="avatar-wrap">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="orb">
        <div class="face" id="face">
          <div class="eye l"></div>
          <div class="eye r"></div>
          <div class="mouth" id="mouth"></div>
        </div>
      </div>
    </div>
    <div class="status" id="status">點擊下方麥克風開始</div>
  </div>

  <div class="panel">
    <div class="panel-head">💬 對話紀錄</div>
    <div id="messages">
      <div class="empty" id="empty">嗨，我是小云 👋<br>連接後直接說話，我會即時回應你</div>
    </div>
  </div>

  <div class="control">
    <button id="mic" aria-label="麥克風">
      <svg width="30" height="30" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    </button>
    <div class="hint" id="hint">點擊連接</div>
  </div>

<script>
  const VOICE='Ethan';
  const INSTRUCTIONS='你是个人助理小云，请用幽默风趣的方式回答用户的问题';

  const micBtn=document.getElementById('mic');
  const statusEl=document.getElementById('status');
  const dotEl=document.getElementById('dot');
  const stageEl=document.getElementById('stage');
  const faceEl=document.getElementById('face');
  const mouthEl=document.getElementById('mouth');
  const msgsEl=document.getElementById('messages');
  const hintEl=document.getElementById('hint');
  const orbEl=document.querySelector('.orb');

  let ws=null,inputCtx=null,outputCtx=null,processor=null,micStream=null;
  let analyser=null,outGain=null,playHead=0,connected=false;
  let asmBubble=null,asmText='';

  function setAvatar(state){
    stageEl.classList.remove('listening','thinking','speaking');
    if(state) stageEl.classList.add(state);
  }
  function setStatus(text,active){statusEl.textContent=text;statusEl.classList.toggle('active',!!active);}

  setInterval(()=>{if(!document.hidden){faceEl.classList.add('blink');setTimeout(()=>faceEl.classList.remove('blink'),200);}},
    3000+Math.random()*2000);

  function addMsg(role,text){
    document.getElementById('empty')?.remove();
    const w=document.createElement('div');w.className='msg '+role;
    w.innerHTML='<div class="av">'+(role==='user'?'🧑':'🤖')+'</div><div class="bub"></div>';
    const b=w.querySelector('.bub');b.textContent=text;
    msgsEl.appendChild(w);msgsEl.scrollTop=msgsEl.scrollHeight;return b;
  }

  function f32toI16(f){const o=new Int16Array(f.length);for(let i=0;i<f.length;i++){const s=Math.max(-1,Math.min(1,f[i]));o[i]=s<0?s*0x8000:s*0x7FFF;}return o;}
  function b64(buf){const u=new Uint8Array(buf);let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));return btoa(s);}

  function playPCM16(s){
    if(!outputCtx)return;
    const bin=atob(s),i16=new Int16Array(bin.length/2);
    for(let i=0;i<i16.length;i++)i16[i]=bin.charCodeAt(i*2)|(bin.charCodeAt(i*2+1)<<8);
    const f=new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++)f[i]=i16[i]/(i16[i]<0?0x8000:0x7FFF);
    const buf=outputCtx.createBuffer(1,f.length,24000);buf.copyToChannel(f,0);
    const src=outputCtx.createBufferSource();src.buffer=buf;src.connect(outGain);
    const t=Math.max(outputCtx.currentTime,playHead);src.start(t);playHead=t+buf.duration;
  }

  let raf=null;
  function reactLoop(){
    if(!analyser){raf=null;return;}
    const arr=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(arr);
    let sum=0;for(let i=0;i<arr.length;i++){const v=(arr[i]-128)/128;sum+=v*v;}
    const rms=Math.sqrt(sum/arr.length);
    const scale=1+Math.min(rms*2.2,.35);
    orbEl.style.transform=`scale(${scale.toFixed(3)})`;
    const mh=8+Math.min(rms*60,26);
    mouthEl.style.height=mh+'px';mouthEl.style.width='30px';mouthEl.style.borderRadius='0 0 18px 18px';
    raf=requestAnimationFrame(reactLoop);
  }
  function stopReact(){if(raf)cancelAnimationFrame(raf);raf=null;orbEl.style.transform='';mouthEl.style.height='8px';}

  function newOutputCtx(){
    outputCtx=new AudioContext();playHead=0;
    outGain=outputCtx.createGain();
    analyser=outputCtx.createAnalyser();analyser.fftSize=256;
    outGain.connect(analyser);analyser.connect(outputCtx.destination);
  }

  async function connect(){
    setStatus('請求麥克風…');micBtn.disabled=true;hintEl.textContent='';
    try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});}
    catch(e){setStatus('無法取得麥克風：'+e.message);micBtn.disabled=false;hintEl.textContent='點擊重試';return;}

    setStatus('連接中…');
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/realtime');

    ws.onopen=()=>{
      connected=true;newOutputCtx();
      ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'session.update',session:{
        modalities:['audio','text'],voice:VOICE,instructions:INSTRUCTIONS,
        input_audio_format:'pcm16',output_audio_format:'pcm16',
        input_audio_transcription:{model:null},
        turn_detection:{type:'server_vad',threshold:0.2,prefix_padding_ms:300,silence_duration_ms:800}
      }}));

      try{inputCtx=new AudioContext({sampleRate:16000});}catch{inputCtx=new AudioContext();}
      const src=inputCtx.createMediaStreamSource(micStream);
      processor=inputCtx.createScriptProcessor(4096,1,1);
      src.connect(processor);processor.connect(inputCtx.destination);
      const inRate=inputCtx.sampleRate,tgt=16000;
      processor.onaudioprocess=e=>{
        if(!ws||ws.readyState!==WebSocket.OPEN)return;
        let s=e.inputBuffer.getChannelData(0);
        if(inRate!==tgt){const r=inRate/tgt,l=Math.floor(s.length/r),d=new Float32Array(l);
          for(let i=0;i<l;i++)d[i]=s[Math.floor(i*r)];s=d;}
        ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'input_audio_buffer.append',audio:b64(f32toI16(s).buffer)}));
      };

      micBtn.disabled=false;micBtn.className='recording';
      dotEl.className='brand-dot live';
      hintEl.textContent='再按一次斷開';
      setAvatar('listening');setStatus('🎙️ 聆聽中，請說話…',true);
    };

    ws.onmessage=e=>{
      let m;try{m=JSON.parse(e.data);}catch{return;}
      switch(m.type){
        case 'session.created':case 'session.updated':break;
        case 'input_audio_buffer.speech_started':
          stopReact();if(outputCtx){try{outputCtx.close();}catch{}}newOutputCtx();
          micBtn.className='recording';setAvatar('listening');setStatus('🎙️ 聆聽中…',true);break;
        case 'input_audio_buffer.speech_stopped':
          setAvatar('thinking');setStatus('🤔 思考中…',true);break;
        case 'response.audio.delta':
          micBtn.className='speaking';setAvatar('speaking');setStatus('🔊 小云回覆中…',true);
          if(!raf)reactLoop();playPCM16(m.delta);break;
        case 'response.audio_transcript.delta':
          if(!asmBubble){asmText='';asmBubble=addMsg('assistant','');}
          asmText+=m.delta;asmBubble.textContent=asmText;msgsEl.scrollTop=msgsEl.scrollHeight;break;
        case 'response.audio_transcript.done':
          if(!asmBubble&&(m.transcript||asmText))addMsg('assistant',m.transcript||asmText);
          asmBubble=null;asmText='';break;
        case 'response.done':case 'response.audio.done':
          stopReact();micBtn.className='recording';setAvatar('listening');setStatus('🎙️ 聆聽中，請說話…',true);break;
        case 'conversation.item.input_audio_transcription.completed':
          if(m.transcript?.trim())addMsg('user',m.transcript.trim());break;
        case 'error':
          console.error('Realtime error:',m);
          setStatus('⚠️ '+(m.error?.message||JSON.stringify(m.error||m)));break;
      }
    };

    ws.onclose=()=>{cleanup();setStatus('已斷開，點擊重連');hintEl.textContent='點擊連接';};
    ws.onerror=()=>{cleanup();setStatus('連接錯誤，點擊重試');hintEl.textContent='點擊重試';};
  }

  function disconnect(){ws?.close();cleanup();setStatus('已斷開，點擊重連');hintEl.textContent='點擊連接';}

  function cleanup(){
    connected=false;stopReact();
    processor?.disconnect();processor=null;
    inputCtx?.close();inputCtx=null;
    outputCtx?.close();outputCtx=null;analyser=null;outGain=null;
    micStream?.getTracks().forEach(t=>t.stop());micStream=null;ws=null;
    micBtn.disabled=false;micBtn.className='';
    dotEl.className='brand-dot';setAvatar(null);
  }

  micBtn.addEventListener('click',()=>{connected?disconnect():connect();});
</script>
</body>
</html>
