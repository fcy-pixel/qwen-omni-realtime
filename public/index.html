<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>小云語音助理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #484f58; transition: background 0.3s; }
    .dot.on { background: #3fb950; }
    .dot.talking { background: #f0883e; animation: blink-dot 0.6s infinite; }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #header h1 { font-size: 17px; font-weight: 600; }
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .welcome { text-align: center; color: #8b949e; margin: auto; padding: 24px; }
    .welcome h2 { font-size: 22px; margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.7; }
    .msg { display: flex; gap: 10px; max-width: 720px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 2px;
    }
    .user .avatar { background: #1f6feb; }
    .assistant .avatar { background: #21262d; border: 1px solid #30363d; }
    .bubble {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 14px; padding: 10px 14px;
      line-height: 1.65; font-size: 15px;
      max-width: calc(100% - 40px);
      white-space: pre-wrap; word-break: break-word;
    }
    .user .bubble { background: #1f6feb; border-color: transparent; border-radius: 14px 4px 14px 14px; }
    .assistant .bubble { border-radius: 4px 14px 14px 14px; }
    /* Controls */
    #controls {
      background: #161b22; border-top: 1px solid #30363d;
      padding: 20px 16px 24px; display: flex; flex-direction: column;
      align-items: center; gap: 12px; flex-shrink: 0;
    }
    #status-text { font-size: 13px; color: #8b949e; min-height: 20px; }
    #mic-btn {
      width: 72px; height: 72px; border-radius: 50%; border: none;
      background: #1f6feb; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(31,111,235,0.35);
    }
    #mic-btn:active { transform: scale(0.95); }
    #mic-btn:disabled { background: #21262d; cursor: not-allowed; box-shadow: none; }
    #mic-btn.recording {
      background: #da3633;
      box-shadow: 0 0 0 0 rgba(218,54,51,0.5);
      animation: pulse-red 1.5s infinite;
    }
    #mic-btn.speaking {
      background: #3fb950;
      box-shadow: 0 0 0 0 rgba(63,185,80,0.5);
      animation: pulse-green 1s infinite;
    }
    @keyframes pulse-red {
      0%   { box-shadow: 0 0 0 0   rgba(218,54,51,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(218,54,51,0);   }
      100% { box-shadow: 0 0 0 0   rgba(218,54,51,0);   }
    }
    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0   rgba(63,185,80,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(63,185,80,0);  }
      100% { box-shadow: 0 0 0 0   rgba(63,185,80,0);  }
    }
    #mic-btn svg { fill: white; pointer-events: none; }
    #hint { font-size: 12px; color: #484f58; }
  </style>
</head>
<body>
  <div id="header">
    <div class="dot" id="dot"></div>
    <h1>小云語音助理</h1>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <h2>🎙️ 你好，我是小云！</h2>
      <p>點擊麥克風按鈕連接<br>連接後直接說話即可，AI 自動偵測語音</p>
    </div>
  </div>

  <div id="controls">
    <div id="status-text">點擊連接</div>
    <button id="mic-btn">
      <!-- Microphone icon -->
      <svg width="30" height="30" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
      </svg>
    </button>
    <div id="hint">再按一次斷開連接</div>
  </div>

  <script>
    const VOICE        = 'Ethan';
    const INSTRUCTIONS = '你是个人助理小云，请用幽默风趣的方式回答用户的问题';

    const micBtn    = document.getElementById('mic-btn');
    const statusEl  = document.getElementById('status-text');
    const dotEl     = document.getElementById('dot');
    const msgsEl    = document.getElementById('messages');
    const hintEl    = document.getElementById('hint');

    let ws          = null;
    let inputCtx    = null;   // AudioContext for mic capture (16kHz)
    let outputCtx   = null;   // AudioContext for playback
    let processor   = null;
    let micStream   = null;
    let playHead    = 0;      // scheduled playback time
    let connected   = false;
    let asmBubble   = null;   // current assistant bubble
    let asmText     = '';

    /* ── helpers ── */
    function setStatus(text, dot = '') {
      statusEl.textContent = text;
      dotEl.className = 'dot' + (dot ? ' ' + dot : '');
    }

    function addMsg(role, text) {
      document.getElementById('welcome')?.remove();
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const icon = role === 'user' ? '👤' : '🤖';
      wrap.innerHTML = '<div class="avatar">' + icon + '</div><div class="bubble"></div>';
      const b = wrap.querySelector('.bubble');
      b.textContent = text;
      msgsEl.appendChild(wrap);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return b;
    }

    function float32ToInt16(f32) {
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        const s = Math.max(-1, Math.min(1, f32[i]));
        i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return i16;
    }

    function toBase64(buffer) {
      const u8 = new Uint8Array(buffer);
      let s = '';
      for (let i = 0; i < u8.length; i += 8192)
        s += String.fromCharCode(...u8.subarray(i, i + 8192));
      return btoa(s);
    }

    function playPCM16(b64) {
      if (!outputCtx) return;
      const bin = atob(b64);
      const i16 = new Int16Array(bin.length / 2);
      for (let i = 0; i < i16.length; i++)
        i16[i] = bin.charCodeAt(i * 2) | (bin.charCodeAt(i * 2 + 1) << 8);
      const f32 = new Float32Array(i16.length);
      for (let i = 0; i < i16.length; i++)
        f32[i] = i16[i] / (i16[i] < 0 ? 0x8000 : 0x7FFF);

      const buf = outputCtx.createBuffer(1, f32.length, 24000);
      buf.copyToChannel(f32, 0);
      const src = outputCtx.createBufferSource();
      src.buffer = buf;
      src.connect(outputCtx.destination);
      const t = Math.max(outputCtx.currentTime, playHead);
      src.start(t);
      playHead = t + buf.duration;
    }

    /* ── connect ── */
    async function connect() {
      setStatus('請求麥克風…');
      micBtn.disabled = true;
      hintEl.style.display = 'none';

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        setStatus('無法取得麥克風：' + e.message);
        micBtn.disabled = false;
        return;
      }

      setStatus('連接中…');
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/realtime');

      ws.onopen = () => {
        connected = true;
        outputCtx = new AudioContext();
        playHead  = 0;

        // Send session config (matching original Python code)
        ws.send(JSON.stringify({
          type: 'session.update',
          session: {
            voice: VOICE,
            instructions: INSTRUCTIONS,
            output_modalities: ['audio', 'text'],
            input_audio_transcription: { model: 'whisper-1' }
          }
        }));

        // Start mic capture at 16kHz
        try {
          inputCtx = new AudioContext({ sampleRate: 16000 });
        } catch {
          inputCtx = new AudioContext();
        }
        const source = inputCtx.createMediaStreamSource(micStream);
        processor   = inputCtx.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(inputCtx.destination); // required to trigger onaudioprocess

        const inputRate  = inputCtx.sampleRate;
        const targetRate = 16000;

        processor.onaudioprocess = e => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          let samples = e.inputBuffer.getChannelData(0);

          // Downsample if AudioContext couldn't honour 16kHz
          if (inputRate !== targetRate) {
            const ratio  = inputRate / targetRate;
            const len    = Math.floor(samples.length / ratio);
            const down   = new Float32Array(len);
            for (let i = 0; i < len; i++) down[i] = samples[Math.floor(i * ratio)];
            samples = down;
          }

          const i16 = float32ToInt16(samples);
          ws.send(JSON.stringify({
            type: 'input_audio_buffer.append',
            audio: toBase64(i16.buffer)
          }));
        };

        micBtn.disabled = false;
        micBtn.className = 'recording';
        hintEl.style.display = '';
        setStatus('🎙️ 錄音中，請說話…', 'on');
      };

      ws.onmessage = e => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        switch (msg.type) {
          case 'response.audio.delta':
            micBtn.className = 'speaking';
            setStatus('🔊 小云回覆中…', 'talking');
            playPCM16(msg.delta);
            break;

          case 'response.audio_transcript.delta':
            if (!asmBubble) { asmText = ''; asmBubble = addMsg('assistant', ''); }
            asmText += msg.delta;
            asmBubble.textContent = asmText;
            msgsEl.scrollTop = msgsEl.scrollHeight;
            break;

          case 'response.audio_transcript.done':
            if (!asmBubble) addMsg('assistant', msg.transcript || asmText);
            asmBubble = null; asmText = '';
            micBtn.className = 'recording';
            setStatus('🎙️ 錄音中，請說話…', 'on');
            break;

          case 'conversation.item.input_audio_transcription.completed':
            if (msg.transcript?.trim()) addMsg('user', msg.transcript.trim());
            break;
        }
      };

      ws.onclose = () => {
        cleanup();
        setStatus('已斷開，點擊重連');
        hintEl.style.display = 'none';
      };

      ws.onerror = () => {
        cleanup();
        setStatus('連接錯誤，點擊重試');
        hintEl.style.display = 'none';
      };
    }

    /* ── disconnect ── */
    function disconnect() {
      ws?.close();
      cleanup();
      setStatus('已斷開，點擊重連');
      hintEl.style.display = 'none';
    }

    function cleanup() {
      connected = false;
      processor?.disconnect(); processor = null;
      inputCtx?.close();  inputCtx  = null;
      outputCtx?.close(); outputCtx = null;
      micStream?.getTracks().forEach(t => t.stop()); micStream = null;
      ws = null;
      micBtn.disabled  = false;
      micBtn.className = '';
      dotEl.className  = 'dot';
    }

    micBtn.addEventListener('click', () => {
      if (!connected) connect(); else disconnect();
    });
  </script>
</body>
</html>
