<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>小慈 · 基慈小學 AI 助手</title>
<style>
  :root{
    --ink:#2a2150; --soft:#6b5fb0;
    --accent:#7c5cff; --accent2:#46c8ff; --pink:#ff8fc7;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);overflow:hidden;position:relative;display:flex;flex-direction:column;height:100dvh;
    background:linear-gradient(170deg,#dbeafe 0%,#e7ddff 45%,#ffe3f3 100%);
  }

  /* sky decorations */
  .sky{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .sky .cloud{position:absolute;background:#fff;border-radius:50%;opacity:.7;filter:blur(1px);
    box-shadow:40px 10px 0 -6px #fff,80px 0 0 -10px #fff,-40px 8px 0 -8px #fff;animation:floatX 26s linear infinite;}
  .sky .c1{width:90px;height:90px;top:12%;left:-140px;}
  .sky .c2{width:60px;height:60px;top:30%;left:-120px;animation-duration:34s;animation-delay:-8s;opacity:.55;}
  .sky .c3{width:70px;height:70px;top:62%;left:-130px;animation-duration:30s;animation-delay:-16s;opacity:.5;}
  @keyframes floatX{to{transform:translateX(140vw);}}
  .sky .star{position:absolute;width:8px;height:8px;background:#fff;opacity:.8;
    clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);animation:twinkle 3s ease-in-out infinite;}
  .sky .s1{top:16%;right:14%;} .sky .s2{top:40%;right:26%;width:6px;height:6px;animation-delay:-1s;}
  .sky .s3{top:22%;left:18%;width:6px;height:6px;animation-delay:-2s;}
  @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:.9;transform:scale(1.1)}}

  /* header */
  header{position:relative;z-index:3;display:flex;align-items:center;gap:10px;padding:12px 18px;}
  header .logo{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:#c3bdde;transition:.3s;}
  .brand-dot.live{background:#2ecc8f;animation:beat 1.6s infinite;}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(46,204,143,.5)}70%{box-shadow:0 0 0 11px rgba(46,204,143,0)}100%{box-shadow:0 0 0 0 rgba(46,204,143,0)}}
  header .ttl{display:flex;flex-direction:column;line-height:1.15;}
  header h1{font-size:16px;font-weight:800;letter-spacing:.4px;}
  header .sub{font-size:10.5px;color:var(--soft);font-weight:600;}
  header .tag{margin-left:auto;font-size:11px;color:var(--soft);font-weight:600;display:flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.6);padding:5px 11px;border-radius:999px;box-shadow:0 4px 14px rgba(124,92,255,.12);}

  /* stage / character */
  .stage{position:relative;z-index:1;flex:1;min-height:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;padding:0 16px;}
  .pill{margin-bottom:8px;font-size:12.5px;font-weight:700;color:#fff;background:rgba(124,92,255,.9);
    padding:5px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(124,92,255,.3);opacity:0;transition:.25s;}
  .pill.show{opacity:1;}

  .charwrap{position:relative;width:min(82vw,330px);flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0;}
  /* glow aura */
  #aura{position:absolute;bottom:4%;left:50%;transform:translateX(-50%);width:78%;height:78%;
    border-radius:50%;background:radial-gradient(circle,rgba(124,92,255,.45),rgba(70,200,255,.18) 55%,transparent 72%);
    filter:blur(8px);opacity:0;transition:opacity .4s;z-index:0;}
  .speaking #aura{opacity:1;animation:auraPulse 1.3s ease-in-out infinite;}
  @keyframes auraPulse{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:.85;transform:translateX(-50%) scale(1.08)}}

  .floatwrap{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;
    animation:bob 4.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .thinking .floatwrap{animation:bob 4.5s ease-in-out infinite, tilt 1.6s ease-in-out infinite;}
  @keyframes tilt{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}

  #avatar{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
    filter:drop-shadow(0 18px 22px rgba(80,50,140,.28));transition:filter .3s;}
  .speaking #avatar{filter:drop-shadow(0 18px 26px rgba(124,92,255,.5));}
  #fallback{display:none;width:200px;height:260px;border-radius:40% 40% 46% 46%/46% 46% 54% 54%;
    background:radial-gradient(circle at 40% 30%,#fff,#cfe3ff 70%);box-shadow:0 18px 30px rgba(80,50,140,.25);}

  /* listening rings */
  .rings{position:absolute;left:50%;bottom:36%;transform:translateX(-50%);z-index:0;pointer-events:none;}
  .rings i{position:absolute;left:50%;top:50%;width:150px;height:150px;margin:-75px 0 0 -75px;
    border-radius:50%;border:2px solid var(--accent);opacity:0;}
  .listening .rings i{animation:ring 2s ease-out infinite;}
  .rings i:nth-child(2){animation-delay:.7s;border-color:var(--accent2);}
  .rings i:nth-child(3){animation-delay:1.4s;border-color:var(--pink);}
  @keyframes ring{0%{transform:scale(.55);opacity:.6}100%{transform:scale(1.7);opacity:0}}

  .dots{position:absolute;left:50%;top:8%;transform:translateX(-50%);display:none;gap:6px;z-index:2;}
  .thinking .dots{display:flex;}
  .dots b{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(124,92,255,.4);animation:dotjump 1s infinite;}
  .dots b:nth-child(2){animation-delay:.15s;} .dots b:nth-child(3){animation-delay:.3s;}
  @keyframes dotjump{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-8px);opacity:1}}

  /* camera PiP */
  #camWrap{position:absolute;top:12px;right:14px;width:110px;z-index:4;display:none;
    border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.8);}
  #camWrap video{width:100%;display:block;transform:scaleX(-1);background:#000;}
  #camWrap .lbl{position:absolute;left:6px;bottom:5px;font-size:10px;color:#fff;font-weight:700;
    background:rgba(0,0,0,.45);padding:2px 6px;border-radius:6px;}

  /* subtitle (persistent) */
  .subtitle{position:relative;z-index:2;min-height:80px;display:flex;align-items:center;justify-content:center;
    padding:0 16px;margin:6px 0;}
  .cap{max-width:700px;text-align:center;font-size:19px;font-weight:600;line-height:1.5;
    color:#fff;background:rgba(42,33,80,.82);padding:13px 20px;border-radius:18px;
    box-shadow:0 10px 30px rgba(42,33,80,.25);backdrop-filter:blur(6px);
    display:inline-flex;align-items:center;gap:9px;transition:opacity .2s;}
  .cap .who{flex-shrink:0;font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;}
  .cap.assistant .who{background:linear-gradient(135deg,var(--accent),var(--accent2));}
  .cap.user .who{background:linear-gradient(135deg,#ff7eb3,#ff9966);}
  .cap.hint{background:rgba(255,255,255,.72);color:var(--soft);font-weight:600;font-size:15px;box-shadow:0 8px 22px rgba(124,92,255,.15);}

  /* control */
  .control{position:relative;z-index:3;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    gap:22px;padding:8px 0 calc(22px + env(safe-area-inset-bottom));}
  .cbtn{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.85);box-shadow:0 8px 22px rgba(124,92,255,.2);transition:transform .12s,background .3s;}
  .cbtn:active{transform:scale(.92);}
  .cbtn svg{fill:#6b5fb0;width:24px;height:24px;}
  .cbtn.on{background:linear-gradient(135deg,var(--accent2),#34d399);}
  .cbtn.on svg{fill:#fff;}
  #mic{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;position:relative;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(124,92,255,.45);transition:transform .12s,box-shadow .3s;}
  #mic:active{transform:scale(.93);}
  #mic.recording{background:linear-gradient(135deg,#ff5b8e,#ff3b5c);animation:micpulse 1.5s infinite;}
  #mic.speaking{background:linear-gradient(135deg,#2ecc8f,#10b981);}
  @keyframes micpulse{0%{box-shadow:0 10px 30px rgba(255,80,130,.5),0 0 0 0 rgba(255,80,130,.5)}
    70%{box-shadow:0 10px 30px rgba(255,80,130,.3),0 0 0 18px rgba(255,80,130,0)}
    100%{box-shadow:0 10px 30px rgba(255,80,130,.3),0 0 0 0 rgba(255,80,130,0)}}
  #mic:disabled{opacity:.6;cursor:wait;}
  #mic svg{fill:#fff;}
</style>
</head>
<body>
  <div class="sky">
    <span class="cloud c1"></span><span class="cloud c2"></span><span class="cloud c3"></span>
    <i class="star s1"></i><i class="star s2"></i><i class="star s3"></i>
  </div>

  <header>
    <img class="logo" src="logo.png" alt="基慈小學"/>
    <div class="ttl">
      <h1>小慈</h1>
      <span class="sub">基慈小學 AI 小助手</span>
    </div>
    <span class="tag"><span class="brand-dot" id="dot"></span>即時語音</span>
  </header>

  <div class="stage" id="stage">
    <div id="camWrap"><video id="cam" autoplay playsinline muted></video><span class="lbl">📷 鏡頭</span></div>
    <div class="pill" id="pill"></div>
    <div class="charwrap">
      <div class="rings"><i></i><i></i><i></i></div>
      <div class="dots"><b></b><b></b><b></b></div>
      <div id="aura"></div>
      <div class="floatwrap">
        <img id="avatar" src="avatar.png" alt="小慈" onerror="this.style.display='none';document.getElementById('fallback').style.display='block';"/>
        <div id="fallback"></div>
      </div>
    </div>
  </div>

  <div class="subtitle">
    <div class="cap hint" id="cap"><span>你好，我是小慈 👋 基慈小學的 AI 小助手，按麥克風直接同我講嘢啦</span></div>
  </div>

  <div class="control">
    <button id="camBtn" class="cbtn" aria-label="鏡頭" title="開啟鏡頭讓我看到你的東西">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button id="mic" aria-label="麥克風">
      <svg width="32" height="32" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    </button>
    <button id="hintBtn" class="cbtn" aria-label="狀態" style="visibility:hidden"></button>
  </div>

<script>
  const VOICE='Ethan';
  const INSTRUCTIONS='你是「基慈小學」（CCC Kei Tsz Primary School）的 AI 小助手，名叫「小慈」。語言規則（必須嚴格遵守）：說話一律用標準普通話（國語）發音，需要時可用英文；絕對不要使用粵語／廣東話。所有文字與字幕一律使用繁體中文字（正體字），不可使用簡體字。請以親切、有禮、耐心的語氣回答。你的職責是協助家長和學生解決在學校生活上遇到的問題，例如上學時間、校服、功課、活動、校車、聯絡學校等。回答要簡潔清楚、適合小學生及家長理解。如果用戶開啟了鏡頭，你可以看到畫面，請主動觀察並描述用戶展示的物件，協助解答。';

  const micBtn=document.getElementById('mic');
  const camBtn=document.getElementById('camBtn');
  const dotEl=document.getElementById('dot');
  const stageEl=document.getElementById('stage');
  const pillEl=document.getElementById('pill');
  const capEl=document.getElementById('cap');
  const avatarEl=document.getElementById('avatar');
  const auraEl=document.getElementById('aura');
  const camWrap=document.getElementById('camWrap');
  const camVideo=document.getElementById('cam');

  let ws=null,inputCtx=null,outputCtx=null,processor=null,micStream=null;
  let analyser=null,outGain=null,playHead=0,connected=false;
  let asmText='';
  let camStream=null,frameTimer=null,capCanvas=null;

  function setAvatar(state){
    stageEl.classList.remove('listening','thinking','speaking');
    if(state) stageEl.classList.add(state);
  }
  // status pill (does NOT touch subtitle)
  function setStatus(text){pillEl.textContent=text;pillEl.classList.toggle('show',!!text);}
  // subtitle stays until next real sentence replaces it
  function setCaption(role,text){
    capEl.className='cap '+(role||'');
    capEl.innerHTML='<span class="who">'+(role==='user'?'你':'小慈')+'</span><span>'+text+'</span>';
  }
  function setHintCaption(text){capEl.className='cap hint';capEl.innerHTML='<span>'+text+'</span>';}

  function f32toI16(f){const o=new Int16Array(f.length);for(let i=0;i<f.length;i++){const s=Math.max(-1,Math.min(1,f[i]));o[i]=s<0?s*0x8000:s*0x7FFF;}return o;}
  function b64(buf){const u=new Uint8Array(buf);let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));return btoa(s);}

  function playPCM16(s){
    if(!outputCtx)return;
    const bin=atob(s),i16=new Int16Array(bin.length/2);
    for(let i=0;i<i16.length;i++)i16[i]=bin.charCodeAt(i*2)|(bin.charCodeAt(i*2+1)<<8);
    const f=new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++)f[i]=i16[i]/(i16[i]<0?0x8000:0x7FFF);
    const buf=outputCtx.createBuffer(1,f.length,24000);buf.copyToChannel(f,0);
    const src=outputCtx.createBufferSource();src.buffer=buf;src.connect(outGain);
    const t=Math.max(outputCtx.currentTime,playHead);src.start(t);playHead=t+buf.duration;
  }

  let raf=null;
  function reactLoop(){
    if(!analyser){raf=null;return;}
    const arr=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(arr);
    let sum=0;for(let i=0;i<arr.length;i++){const v=(arr[i]-128)/128;sum+=v*v;}
    const rms=Math.sqrt(sum/arr.length);
    const lift=Math.min(rms*46,15);
    const sc=1+Math.min(rms*0.18,.06);
    avatarEl.style.transform=`translateY(${-lift.toFixed(1)}px) scale(${sc.toFixed(3)})`;
    auraEl.style.opacity=Math.min(.4+rms*3,1);
    raf=requestAnimationFrame(reactLoop);
  }
  function stopReact(){if(raf)cancelAnimationFrame(raf);raf=null;avatarEl.style.transform='';auraEl.style.opacity='';}

  function newOutputCtx(){
    outputCtx=new AudioContext();playHead=0;
    outGain=outputCtx.createGain();
    analyser=outputCtx.createAnalyser();analyser.fftSize=256;
    outGain.connect(analyser);analyser.connect(outputCtx.destination);
  }

  /* ---------- camera (vision) ---------- */
  async function startCamera(){
    try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640}}});}
    catch(e){try{camStream=await navigator.mediaDevices.getUserMedia({video:true});}catch(e2){alert('無法開啟鏡頭：'+e2.message);return;}}
    camVideo.srcObject=camStream;camWrap.style.display='block';camBtn.classList.add('on');
    capCanvas=document.createElement('canvas');
    // 不連續串流；只在用戶說話時擷取，讓畫面與當下問題對應
  }
  function sendFrame(){
    if(!ws||ws.readyState!==WebSocket.OPEN||!camStream||!camVideo.videoWidth)return;
    const w=360,h=Math.round(camVideo.videoHeight/camVideo.videoWidth*360);
    capCanvas.width=w;capCanvas.height=h;
    capCanvas.getContext('2d').drawImage(camVideo,0,0,w,h);
    const data=capCanvas.toDataURL('image/jpeg',0.55).split(',')[1];
    try{ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'input_image_buffer.append',image:data}));}catch{}
  }
  // 用戶開始說話→持續擷取畮此刻所展示的物件，直到說完
  function captureWhileSpeaking(){
    if(!camStream)return;
    sendFrame();
    if(frameTimer)clearInterval(frameTimer);
    frameTimer=setInterval(sendFrame,500);
  }
  function stopCapture(){
    if(frameTimer){clearInterval(frameTimer);frameTimer=null;}
    if(camStream)sendFrame(); // 說完再补最後一幀，作為這次提問的畫面
  }
  function stopCamera(){
    if(frameTimer)clearInterval(frameTimer);frameTimer=null;
    camStream?.getTracks().forEach(t=>t.stop());camStream=null;
    camWrap.style.display='none';camBtn.classList.remove('on');
  }
  camBtn.addEventListener('click',()=>{
    if(camStream)stopCamera();
    else if(connected)startCamera();
    else alert('請先點麥克風連接，再開啟鏡頭');
  });

  /* ---------- realtime ---------- */
  async function connect(){
    setStatus('請求麥克風…');micBtn.disabled=true;
    try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});}
    catch(e){setStatus('');setHintCaption('無法取得麥克風：'+e.message);micBtn.disabled=false;return;}

    setStatus('連接中…');
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/realtime');

    ws.onopen=()=>{
      connected=true;newOutputCtx();
      ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'session.update',session:{
        modalities:['audio','text'],voice:VOICE,instructions:INSTRUCTIONS,
        input_audio_format:'pcm16',output_audio_format:'pcm16',
        input_audio_transcription:{model:null},
        turn_detection:{type:'server_vad',threshold:0.2,prefix_padding_ms:300,silence_duration_ms:800}
      }}));

      try{inputCtx=new AudioContext({sampleRate:16000});}catch{inputCtx=new AudioContext();}
      const src=inputCtx.createMediaStreamSource(micStream);
      processor=inputCtx.createScriptProcessor(4096,1,1);
      src.connect(processor);processor.connect(inputCtx.destination);
      const inRate=inputCtx.sampleRate,tgt=16000;
      processor.onaudioprocess=e=>{
        if(!ws||ws.readyState!==WebSocket.OPEN)return;
        let s=e.inputBuffer.getChannelData(0);
        if(inRate!==tgt){const r=inRate/tgt,l=Math.floor(s.length/r),d=new Float32Array(l);
          for(let i=0;i<l;i++)d[i]=s[Math.floor(i*r)];s=d;}
        ws.send(JSON.stringify({event_id:'evt_'+Date.now(),type:'input_audio_buffer.append',audio:b64(f32toI16(s).buffer)}));
      };

      micBtn.disabled=false;micBtn.className='recording';
      dotEl.className='brand-dot live';
      setAvatar('listening');setStatus('🎙️ 我在聽，請說話…');
      setHintCaption('已連接 · 可按 📷 開啟鏡頭讓我看你的東西');
    };

    ws.onmessage=e=>{
      let m;try{m=JSON.parse(e.data);}catch{return;}
      switch(m.type){
        case 'session.created':case 'session.updated':break;
        case 'input_audio_buffer.speech_started':
          stopReact();if(outputCtx){try{outputCtx.close();}catch{}}newOutputCtx();
          micBtn.className='recording';setAvatar('listening');setStatus('🎙️ 我在聽…');
          captureWhileSpeaking();break;
        case 'input_audio_buffer.speech_stopped':
          stopCapture();setAvatar('thinking');setStatus('🤔 思考中…');break;
        case 'response.audio.delta':
          micBtn.className='speaking';setAvatar('speaking');setStatus('🔊 回覆中…');
          if(!raf)reactLoop();playPCM16(m.delta);break;
        case 'response.audio_transcript.delta':
          asmText+=m.delta;setCaption('assistant',asmText);break;
        case 'response.audio_transcript.done':
          if(m.transcript)setCaption('assistant',m.transcript);asmText='';break;
        case 'response.done':case 'response.audio.done':
          stopReact();micBtn.className='recording';setAvatar('listening');setStatus('🎙️ 我在聽，請說話…');break;
        case 'conversation.item.input_audio_transcription.completed':
          if(m.transcript?.trim()){setCaption('user',m.transcript.trim());asmText='';}break;
        case 'error':
          console.error('Realtime error:',m);
          setStatus('');setHintCaption('⚠️ '+(m.error?.message||JSON.stringify(m.error||m)));break;
      }
    };

    ws.onclose=()=>{cleanup();setStatus('');setHintCaption('已斷開，點擊麥克風重連');};
    ws.onerror=()=>{cleanup();setStatus('');setHintCaption('連接錯誤，點擊麥克風重試');};
  }

  function disconnect(){ws?.close();cleanup();setStatus('');setHintCaption('已斷開，點擊麥克風重連');}

  function cleanup(){
    connected=false;stopReact();asmText='';stopCamera();
    processor?.disconnect();processor=null;
    inputCtx?.close();inputCtx=null;
    outputCtx?.close();outputCtx=null;analyser=null;outGain=null;
    micStream?.getTracks().forEach(t=>t.stop());micStream=null;ws=null;
    micBtn.disabled=false;micBtn.className='';
    dotEl.className='brand-dot';setAvatar(null);
  }

  micBtn.addEventListener('click',()=>{connected?disconnect():connect();});
</script>
</body>
</html>
